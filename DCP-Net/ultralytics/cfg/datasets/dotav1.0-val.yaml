# Ultralytics YOLO 🚀, GPL-3.0 license
# DOTA-v1.0 dataset http://cocodataset.org by Microsoft
# Example usage: yolo train data=coco.yaml
# parent
# ├── DCP-Net
# └── datasets
#     └── coco  ← downloads here (20.1 GB)

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: datasets/dota # dataset root dir
train: images/train.txt  # train images (relative to 'path') 
val: coco/val2017.txt # val images (relative to 'path') val.txt->val2017.txt
test: images/val.txt 

# Classes
nc: 15  # number of classes

names:
  0: "plane"
  1: "ship"
  2: "storage-tank"
  3: "baseball-diamond"
  4: "tennis-court"
  5: "basketball-court"
  6: "ground-track-field"
  7: "harbor"
  8: "bridge"
  9: "large-vehicle"
  10: "small-vehicle"
  11: "helicopter"
  12: "roundabout"
  13: "soccer-ball-field"
  14: "swimming-pool"

