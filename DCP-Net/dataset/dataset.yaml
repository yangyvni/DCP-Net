# Ultralytics YOLO 🚀, GPL-3.0 license
# AI-TODv2 dataset http://cocodataset.org by Microsoft
# Example usage: yolo train data=coco.yaml
# parent
# ├── DCP-Net
# └── datasets
#     └── coco  ← downloads here (20.1 GB)

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: data/aitod # dataset root dir
train: images/trainval.txt  # train images (relative to 'path')
val: images/test.txt  # val images (relative to 'path') 
test: images/test.txt # 

# Classes
nc: 8  # number of classes

names:
  0: airplane
  1: bridge
  2: storage-tank
  3: ship
  4: swimming-pool
  5: vehicle
  6: person
  7: wind-mill

